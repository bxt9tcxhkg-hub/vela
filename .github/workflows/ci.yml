name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  lint-and-build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Get pnpm store directory
        id: pnpm-cache
        run: echo "STORE_PATH=$(pnpm store path)" >> $GITHUB_OUTPUT

      - name: Setup pnpm cache
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: ${{ runner.os }}-pnpm-

      - name: Sanitize npm proxy env
        run: |
          echo "npm_config_http_proxy=" >> $GITHUB_ENV
          echo "npm_config_https_proxy=" >> $GITHUB_ENV
          echo "NPM_CONFIG_HTTP_PROXY=" >> $GITHUB_ENV
          echo "NPM_CONFIG_HTTPS_PROXY=" >> $GITHUB_ENV

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm turbo lint --continue || true   # Non-blocking: lint rules werden schrittweise stabilisiert

      - name: Type check
        run: pnpm tsc --noEmit || true

      - name: Build
        run: pnpm turbo build --continue
