name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: windows-latest
            platform: win
          - os: macos-latest
            platform: mac
          - os: ubuntu-latest
            platform: linux

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build all packages
        run: pnpm build

      # macOS: Certificate aus GitHub Secrets importieren
      - name: Import Apple Certificate (macOS only)
        if: matrix.platform == 'mac' && env.APPLE_CERTIFICATE != ''
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          KEYCHAIN_PATH=$RUNNER_TEMP/build.keychain
          CERTIFICATE_PATH=$RUNNER_TEMP/certificate.p12
          echo "$APPLE_CERTIFICATE" | base64 --decode > "$CERTIFICATE_PATH"
          security create-keychain -p "" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "" "$KEYCHAIN_PATH"
          security import "$CERTIFICATE_PATH" -P "$APPLE_CERTIFICATE_PASSWORD" -k "$KEYCHAIN_PATH" -T /usr/bin/codesign
          security list-keychain -d user -s "$KEYCHAIN_PATH"
          echo "KEYCHAIN_PATH=$KEYCHAIN_PATH" >> $GITHUB_ENV

      - name: Build & publish Electron app (${{ matrix.platform }})
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # macOS Code-Signing (nur aktiv wenn Secrets gesetzt)
          CSC_LINK: ${{ secrets.APPLE_CERTIFICATE }}
          CSC_KEY_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          CSC_IDENTITY_AUTO_DISCOVERY: ${{ matrix.platform == 'mac' && secrets.APPLE_CERTIFICATE != '' }}
          # Notarisierung
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          cd packages/desktop
          pnpm dist:${{ matrix.platform }} --publish=always

      - name: Cleanup Keychain (macOS only)
        if: matrix.platform == 'mac' && always()
        run: |
          if [ -f "$RUNNER_TEMP/build.keychain" ]; then
            security delete-keychain "$RUNNER_TEMP/build.keychain" || true
          fi

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: release-${{ matrix.platform }}
          path: packages/desktop/release/**/*
          retention-days: 7

  create-release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: Vela v${{ steps.version.outputs.VERSION }}
          body: |
            ## Vela v${{ steps.version.outputs.VERSION }}

            ### Installation
            - **Windows**: Lade `vela-setup-*.exe` herunter
            - **macOS**: Lade `Vela-*.dmg` herunter *(Code-signiert & notarisiert — kein Gatekeeper-Dialog)*
            - **Linux**: Lade `Vela-*.AppImage` herunter

            ### Was ist neu
            Siehe [CHANGELOG](https://github.com/bxt9tcxhkg-hub/vela/blob/main/CHANGELOG.md)

            ### macOS Code-Signing
            Die macOS-Version ist mit einem Apple Developer ID Certificate signiert und notarisiert.
            `spctl --assess --verbose Vela.app` gibt `accepted` zurück.
          draft: false
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
