# Vela – Docker Pro Setup
# Selbst-gehostete Instanz mit persistentem Storage

version: '3.8'

services:

  vela-server:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: vela-server
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      PORT: 3000
      VELA_NAME: ${VELA_NAME:-Vela}
      VELA_SYSTEM_PROMPT: ${VELA_SYSTEM_PROMPT:-}
      # AI Provider (mindestens einer muss konfiguriert sein)
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      # Ollama (wenn lokal auf dem Host läuft)
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://host.docker.internal:11434}
      OLLAMA_MODEL: ${OLLAMA_MODEL:-llama3.1:8b}
      # Gmail (optional)
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      GOOGLE_REFRESH_TOKEN: ${GOOGLE_REFRESH_TOKEN:-}
      # Datenverzeichnis
      VELA_DATA_DIR: /data
    volumes:
      - vela-data:/data
    networks:
      - vela-net
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # Optionaler Ollama-Service (wenn kein lokales Ollama verfügbar)
  ollama:
    image: ollama/ollama:latest
    container_name: vela-ollama
    restart: unless-stopped
    profiles:
      - with-ollama     # nur aktivieren mit: docker compose --profile with-ollama up
    ports:
      - "11434:11434"
    volumes:
      - ollama-data:/root/.ollama
    networks:
      - vela-net
    # GPU Support (optional, NVIDIA)
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: 1
    #           capabilities: [gpu]

volumes:
  vela-data:
    driver: local
  ollama-data:
    driver: local

networks:
  vela-net:
    driver: bridge
