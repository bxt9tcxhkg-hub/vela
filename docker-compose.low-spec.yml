# Vela – Low-Spec Modus
# Geeignet für PCs mit wenig RAM (4 GB+) und schwacher GPU
# Verwendet Cloud-Provider statt lokalem Ollama
# Start: docker compose -f docker-compose.low-spec.yml up

services:
  vela:
    build: .
    ports:
      - "3000:3000"
    environment:
      - HOST=0.0.0.0
      - PORT=3000
      - NODE_ENV=production
      - DEFAULT_MODE=cloud
      # Cloud-Key (mind. einen setzen):
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
      # Sparsamstes Modell pro Provider:
      - DEFAULT_MODEL=${DEFAULT_MODEL:-claude-haiku-4-5-20251001}
    deploy:
      resources:
        limits:
          memory: 512M        # Vela-Server braucht wenig RAM
          cpus: '0.5'
        reservations:
          memory: 256M
    volumes:
      - vela-data:/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/health"]
      interval: 60s
      timeout: 10s
      retries: 3

volumes:
  vela-data:
