name: email-reader
version: 1.0.0
description: Read and summarize emails from connected inbox
author: vela-team
license: Apache-2.0
permissions:
  - email:read
inputs:
  - name: filter
    type: string
    required: false
    description: Filter emails by sender, subject, or date
  - name: limit
    type: number
    required: false
    description: Maximum number of emails to read (default 10)
guardrails:
  confirmBeforeExecute: false
  maxTokensOutput: 4000
  riskLevel: low
