name: email-sender
version: 1.0.0
description: Compose and send an email on behalf of the user
author: vela-team
license: Apache-2.0
permissions:
  - email:read
  - email:write
inputs:
  - name: to
    type: string
    required: true
    description: Recipient email address
  - name: subject
    type: string
    required: true
    description: Email subject
  - name: body
    type: string
    required: true
    description: Email body (plain text or markdown)
guardrails:
  confirmBeforeExecute: true
  riskLevel: medium
